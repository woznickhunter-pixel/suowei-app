name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Install Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.10'
      - name: Generate app icons
        run: |
          pip install Pillow -q
          python3 << 'PYEOF'
from PIL import Image, ImageDraw, ImageFont
import os

sizes = {'mipmap-mdpi':48,'mipmap-hdpi':72,'mipmap-xhdpi':96,'mipmap-xxhdpi':144,'mipmap-xxxhdpi':192}
for folder, size in sizes.items():
    os.makedirs(f'app/src/main/res/{folder}', exist_ok=True)
    img = Image.new('RGBA', (size, size), (0,0,0,0))
    draw = ImageDraw.Draw(img)
    r = size // 5
    draw.rounded_rectangle([0,0,size-1,size-1], radius=r, fill=(28,28,32,255))
    try:
        font = ImageFont.truetype('/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf', int(size*0.55))
    except:
        font = ImageFont.load_default()
    text = 'S'
    bbox = draw.textbbox((0,0), text, font=font)
    x = (size-(bbox[2]-bbox[0]))//2 - bbox[0]
    y = (size-(bbox[3]-bbox[1]))//2 - bbox[1]
    draw.text((x,y), text, fill=(255,255,255,255), font=font)
    img.save(f'app/src/main/res/{folder}/ic_launcher.png')
    img.save(f'app/src/main/res/{folder}/ic_launcher_round.png')
    print(f'Created {folder} {size}x{size}')
PYEOF
      - name: Build Debug APK
        run: gradle assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: suowei-app
          path: app/build/outputs/apk/debug/app-debug.apk
